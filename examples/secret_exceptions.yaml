version: 1
rules:
  - id: aws-not-used-placeholder-001
    enabled: true
    provider: aws
    scanner_rule_ids: [aws-access-token, aws-secret-key, generic-api-key]
    decision: false_positive
    reason: "AWS в организации не используется; совпадение относится к тестовым fixture/example values."
    owner: appsec
    created_at: "2026-06-15"
    expires_at: "2027-06-15"
    match:
      condition: AND
      path_regex: ["(?i)(test|tests|fixture|fixtures|example|examples|mock|mocks|docs)/"]
      line_regex: ["(?i)(example|sample|dummy|mock|placeholder|fake|test)"]
      secret_regex: ["(?i)(AKIAIOSFODNN7EXAMPLE|dummy|example|placeholder|fake)"]
    tags: [known-false-positive, provider-not-used]
  - id: title-sonarcloud-credential-001
    enabled: true
    provider: sonarcloud
    scanner_rule_ids: []
    decision: false_positive
    reason: "Credential finding title identifies SonarCloud credentials that are accepted as reviewed exceptions."
    owner: appsec
    created_at: "2026-06-17"
    expires_at: "2027-06-17"
    match:
      condition: AND
      title_regex: ["SonarCloud"]
    tags: [known-false-positive, title-based-exception]
  - id: title-slack-webhook-credential-001
    enabled: true
    provider: slack
    scanner_rule_ids: []
    decision: false_positive
    reason: "Credential finding title identifies SlackWebhook credentials that are accepted as reviewed exceptions."
    owner: appsec
    created_at: "2026-06-17"
    expires_at: "2027-06-17"
    match:
      condition: AND
      title_regex: ["SlackWebhook"]
    tags: [known-false-positive, title-based-exception]
  - id: title-facebook-oauth-credential-001
    enabled: true
    provider: facebook
    scanner_rule_ids: []
    decision: false_positive
    reason: "Credential finding title identifies detected-facebook-oauth credentials that are accepted as reviewed exceptions."
    owner: appsec
    created_at: "2026-06-17"
    expires_at: "2027-06-17"
    match:
      condition: AND
      title_regex: ["detected-facebook-oauth"]
    tags: [known-false-positive, title-based-exception]
  - id: title-google-api-key-credential-001
    enabled: true
    provider: google
    scanner_rule_ids: []
    decision: false_positive
    reason: "Credential finding title identifies detected-google-api-key credentials that are accepted as reviewed exceptions."
    owner: appsec
    created_at: "2026-06-17"
    expires_at: "2027-06-17"
    match:
      condition: AND
      title_regex: ["detected-google-api-key"]
    tags: [known-false-positive, title-based-exception]
