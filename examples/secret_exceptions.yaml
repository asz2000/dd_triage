version: 1
rules:
  - id: aws-not-used-placeholder-001
    enabled: true
    provider: aws
    scanner_rule_ids: [aws-access-token, aws-secret-key, generic-api-key]
    decision: false_positive
    reason: "AWS в организации не используется; совпадение относится к тестовым fixture/example values."
    owner: appsec
    created_at: "2026-06-15"
    expires_at: "2027-06-15"
    match:
      condition: AND
      path_regex: ["(?i)(test|tests|fixture|fixtures|example|examples|mock|mocks|docs)/"]
      line_regex: ["(?i)(example|sample|dummy|mock|placeholder|fake|test)"]
      secret_regex: ["(?i)(AKIAIOSFODNN7EXAMPLE|dummy|example|placeholder|fake)"]
    tags: [known-false-positive, provider-not-used]
